<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
      align-self: flex-start;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4f8ef7;
    }

    .input-row button {
      padding: 10px 18px;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-row button:hover {
      background: #3a76e0;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      color: #718096;
      margin-bottom: 12px;
    }

    .stats span { font-weight: 600; color: #4f8ef7; }

    .filter-row {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .filter-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1.5px solid #e2e8f0;
      background: #fff;
      font-size: 0.82rem;
      cursor: pointer;
      color: #718096;
      transition: all 0.15s;
    }

    .filter-btn.active {
      background: #4f8ef7;
      border-color: #4f8ef7;
      color: #fff;
      font-weight: 600;
    }

    ul#list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 40px;
    }

    li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 10px;
      background: #f7f9fc;
      border: 1.5px solid #e2e8f0;
      transition: opacity 0.2s, background 0.2s;
    }

    li.checked {
      background: #edf7ee;
      border-color: #b7e4bc;
      opacity: 0.75;
    }

    .check-btn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #cbd5e0;
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
      font-size: 0.85rem;
    }

    li.checked .check-btn {
      background: #48bb78;
      border-color: #48bb78;
      color: #fff;
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #2d3748;
      word-break: break-word;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .del-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .del-btn:hover {
      color: #e53e3e;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      font-size: 0.9rem;
      padding: 28px 0;
    }

    .clear-btn {
      display: block;
      width: 100%;
      margin-top: 18px;
      padding: 9px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      background: #fff;
      color: #e53e3e;
      font-size: 0.87rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    .clear-btn:hover {
      background: #fff5f5;
      border-color: #e53e3e;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>
    <p class="subtitle">살 것들을 추가하고 구매 완료 시 체크하세요.</p>

    <div class="input-row">
      <input id="itemInput" type="text" placeholder="아이템을 입력하세요..." maxlength="60" />
      <button id="addBtn" title="추가">+</button>
    </div>

    <div class="stats">
      <div>전체 <span id="totalCount">0</span>개</div>
      <div>완료 <span id="checkedCount">0</span>개</div>
      <div>남은 항목 <span id="remainCount">0</span>개</div>
    </div>

    <div class="filter-row">
      <button class="filter-btn active" data-filter="all">전체</button>
      <button class="filter-btn" data-filter="remaining">미완료</button>
      <button class="filter-btn" data-filter="checked">완료</button>
    </div>

    <ul id="list"></ul>

    <button class="clear-btn" id="clearBtn">완료된 항목 모두 삭제</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://nmdylsviosbkplrgkpxd.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5tZHlsc3Zpb3Nia3BscmdrcHhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTY1MTQsImV4cCI6MjA4OTQ5MjUxNH0.InS-Wih8a_LpnwPlPgB_oNhqT4HfkrF9Pus5KJ9YiKo';
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let items = [];
    let filter = 'all';

    const listEl = document.getElementById('list');
    const inputEl = document.getElementById('itemInput');
    const addBtn = document.getElementById('addBtn');
    const clearBtn = document.getElementById('clearBtn');
    const totalEl = document.getElementById('totalCount');
    const checkedEl = document.getElementById('checkedCount');
    const remainEl = document.getElementById('remainCount');

    function render() {
      const filtered = items.filter(item => {
        if (filter === 'checked') return item.checked;
        if (filter === 'remaining') return !item.checked;
        return true;
      });

      listEl.innerHTML = '';

      if (filtered.length === 0) {
        listEl.innerHTML = '<li class="empty" style="border:none;background:none;">항목이 없습니다.</li>';
      } else {
        filtered.forEach(item => {
          const li = document.createElement('li');
          if (item.checked) li.classList.add('checked');

          const checkBtn = document.createElement('button');
          checkBtn.className = 'check-btn';
          checkBtn.innerHTML = item.checked ? '✓' : '';
          checkBtn.title = item.checked ? '체크 해제' : '완료 체크';
          checkBtn.addEventListener('click', () => toggle(item.id));

          const text = document.createElement('span');
          text.className = 'item-text';
          text.textContent = item.text;

          const delBtn = document.createElement('button');
          delBtn.className = 'del-btn';
          delBtn.innerHTML = '✕';
          delBtn.title = '삭제';
          delBtn.addEventListener('click', () => remove(item.id));

          li.append(checkBtn, text, delBtn);
          listEl.appendChild(li);
        });
      }

      const checked = items.filter(i => i.checked).length;
      totalEl.textContent = items.length;
      checkedEl.textContent = checked;
      remainEl.textContent = items.length - checked;
    }

    async function loadItems() {
      const { data, error } = await sbClient
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: true });
      if (!error) {
        items = data;
        render();
      }
    }

    async function addItem() {
      const text = inputEl.value.trim();
      if (!text) return;
      const newItem = { id: Date.now(), text, checked: false };
      const { error } = await sbClient.from('shopping_items').insert(newItem);
      if (!error) {
        items.push(newItem);
        inputEl.value = '';
        render();
        inputEl.focus();
      }
    }

    async function toggle(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;
      const { error } = await sbClient
        .from('shopping_items')
        .update({ checked: !item.checked })
        .eq('id', id);
      if (!error) {
        item.checked = !item.checked;
        render();
      }
    }

    async function remove(id) {
      const { error } = await sbClient.from('shopping_items').delete().eq('id', id);
      if (!error) {
        items = items.filter(i => i.id !== id);
        render();
      }
    }

    addBtn.addEventListener('click', addItem);
    inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

    clearBtn.addEventListener('click', async () => {
      const checkedIds = items.filter(i => i.checked).map(i => i.id);
      if (checkedIds.length === 0) return;
      const { error } = await sbClient
        .from('shopping_items')
        .delete()
        .in('id', checkedIds);
      if (!error) {
        items = items.filter(i => !i.checked);
        render();
      }
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filter = btn.dataset.filter;
        render();
      });
    });

    loadItems();
  </script>
</body>
</html>
